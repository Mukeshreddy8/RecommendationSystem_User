<!DOCTYPE html>
<html>
<head>
    <title>Agentic Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>🔍 Find Personalized Recommendations</h2>
        <form method="post">
            <input type="text" name="user" placeholder="Enter user name" required>
            <button type="submit">Get Recommendations</button>
        </form>

        {% if output %}
            <div class="output-box">
                <pre>{{ output }}</pre>
            </div>
        {% endif %}
    </div>
</body>
</html>
